version: '3.8'
services:
  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devops_lab
      MYSQL_USER: pank
      MYSQL_PASSWORD: devops_lab
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      start_period: 30s

  python-app:
    build: ./app
    ports:
      - "5000:5000"
    depends_on:
      mysql-db:
        condition: service_healthy
